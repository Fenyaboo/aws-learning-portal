<!DOCTYPE html>
<html>

<head>

<title>Member Login</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
background:#020617;
padding:20px;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:300px;
margin:auto;
margin-top:100px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
margin-top:20px;
padding:12px 20px;
background:#38bdf8;
border:none;
border-radius:6px;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h1>Member Login</h1>

</header>

<div class="login-box">

<form action="/login" method="post">

<input name="user" placeholder="Username">

<input name="pass" type="password" placeholder="Password">

<button>Login</button>

</form>

</div>

</body>

</html>
